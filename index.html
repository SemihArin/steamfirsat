<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#05080d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Steam Fırsat Merkezi - En iyi oyun indirimlerini keşfedin.">
    <title>Steam Fırsat Merkezi | Premium PWA</title>
    <style id="font-defs">
        /* Rajdhani yerine: dar, bold display font — CSP uyumlu sistem stack */
        :root {
            --font-display: 'Trebuchet MS', 'Arial Narrow', Arial, sans-serif;
            --font-body: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
        }
    </style>
    <style>
        /* ===== TEMA & DEĞİŞKENLER ===== */
        :root {
            --bg-dark: #05080d;
            --bg-panel: rgba(27, 40, 56, 0.6);
            --bg-card: rgba(22, 32, 45, 0.9);
            --bg-card-hover: rgba(30, 44, 62, 1);
            --primary: #66c0f4;
            --primary-glow: rgba(102, 192, 244, 0.35);
            --primary-dim: rgba(102, 192, 244, 0.12);
            --accent: #a4d007;
            --accent-glow: rgba(164, 208, 7, 0.3);
            --danger: #e63946;
            --success: #2dcc71;
            --warning: #f4a261;
            --text-main: #e8edf2;
            --text-muted: #6b7c93;
            --border: rgba(102, 192, 244, 0.12);
            --border-hover: rgba(102, 192, 244, 0.35);
            --nav-height: 60px;
            --bottom-nav-height: 66px;
            --radius: 12px;
            --radius-lg: 18px;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(ellipse at 10% 20%, rgba(102, 192, 244, 0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 90% 80%, rgba(164, 208, 7, 0.04) 0%, transparent 55%);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: var(--font-body), sans-serif;
            padding-top: var(--nav-height);
            padding-bottom: calc(var(--bottom-nav-height) + 16px);
            min-height: 100vh;
        }
        body.modal-open { overflow: hidden; }

        /* ===== SPLASH ===== */
        #splash-screen {
            position: fixed; inset: 0;
            background: var(--bg-dark); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.7s ease, visibility 0.7s, transform 0.7s ease;
        }
        #splash-screen.hidden { opacity: 0; visibility: hidden; transform: scale(1.1); pointer-events: none; }

        .splash-bg-grid {
            position: absolute; inset: 0;
            background-image: linear-gradient(rgba(102,192,244,0.04) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(102,192,244,0.04) 1px, transparent 1px);
            background-size: 44px 44px;
            opacity: 0; animation: fadeIn 1.2s ease 0.3s forwards;
        }
        .splash-content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 0; }
        .splash-glow {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 140px; height: 140px; background: var(--primary);
            filter: blur(55px); opacity: 0; border-radius: 50%;
            animation: pulseGlow 2s infinite alternate 0.5s;
        }
        @keyframes pulseGlow { 0% { opacity: 0.08; transform: translateX(-50%) scale(0.8); } 100% { opacity: 0.35; transform: translateX(-50%) scale(1.2); } }

        .splash-logo { position: relative; z-index: 2; width: 90px; height: 90px; margin-bottom: 20px; filter: drop-shadow(0 0 12px var(--primary-glow)); }
        .hex-path { stroke-dasharray: 260; stroke-dashoffset: 260; animation: drawLine 1s cubic-bezier(0.4,0,0.2,1) 0.3s forwards; }
        .perc-line { stroke-dasharray: 50; stroke-dashoffset: 50; animation: drawLine 0.5s ease 1.1s forwards; }
        .perc-dot { opacity: 0; transform: scale(0); transform-box: fill-box; transform-origin: center; animation: popDot 0.35s cubic-bezier(0.175,0.885,0.32,1.275) forwards; }
        .dot-1 { animation-delay: 1.4s; } .dot-2 { animation-delay: 1.6s; }
        @keyframes drawLine { to { stroke-dashoffset: 0; } }
        @keyframes popDot { to { opacity: 1; transform: scale(1); } }

        .splash-text {
            position: relative; z-index: 2;
            font-family: var(--font-display);
            font-size: 2em; font-weight: 700; letter-spacing: 6px; text-transform: uppercase;
            background: linear-gradient(90deg, transparent 0%, var(--primary) 30%, #fff 50%, var(--primary) 70%, transparent 100%);
            background-size: 200% 100%; -webkit-background-clip: text; background-clip: text; color: transparent;
            opacity: 0; animation: fadeIn 0.4s forwards 1s, shimmer 2.5s infinite linear 1s;
            margin-bottom: 20px;
        }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .splash-loader { width: 150px; height: 3px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; opacity: 0; animation: fadeIn 0.4s forwards 1.2s; }
        .splash-loader-bar { height: 100%; width: 0%; background: var(--primary); box-shadow: 0 0 12px var(--primary); border-radius: 3px; animation: loadProgress 1.6s ease 1.2s forwards; }
        @keyframes loadProgress { 0% { width: 0%; } 40% { width: 55%; } 100% { width: 100%; } }

        /* ===== ÜST HEADER ===== */
        .top-header {
            position: fixed; top: 0; left: 0; right: 0; height: var(--nav-height);
            background: rgba(5,8,13,0.88); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            display: flex; align-items: center; justify-content: space-between; padding: 0 16px;
            z-index: 1000; border-bottom: 1px solid var(--border);
        }
        .logo {
            font-family: var(--font-display);
            font-size: 1.5em; font-weight: 700; text-decoration: none; color: var(--text-main);
            letter-spacing: 1px; line-height: 1;
        }
        .logo span { color: var(--primary); }

        .desktop-nav { display: none; list-style: none; gap: 24px; margin-right: auto; margin-left: 28px; }
        .desktop-nav a {
            color: var(--text-muted); text-decoration: none; font-weight: 600; font-size: 0.9em;
            transition: color 0.2s; position: relative; padding-bottom: 2px;
        }
        .desktop-nav a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background: var(--primary); transition: width 0.3s; border-radius: 2px; }
        .desktop-nav a.active, .desktop-nav a:hover { color: var(--text-main); }
        .desktop-nav a.active::after { width: 100%; box-shadow: 0 0 8px var(--primary); }

        .header-right { display: flex; align-items: center; gap: 10px; }
        .currency-select {
            background: var(--bg-card); color: var(--accent); border: 1px solid var(--border);
            padding: 6px 10px; border-radius: 8px; font-weight: 600; outline: none; cursor: pointer;
            font-family: var(--font-body); transition: all 0.2s; font-size: 0.85em;
        }
        .currency-select:hover { border-color: var(--primary); }

        /* ===== ALT NAV ===== */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: var(--bottom-nav-height);
            background: rgba(12,18,28,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center;
            z-index: 1000; padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 3px;
            color: var(--text-muted); text-decoration: none; font-size: 0.65em; font-weight: 600;
            width: 33%; padding: 8px 0; transition: color 0.2s; position: relative;
            font-family: var(--font-display); letter-spacing: 0.5px; text-transform: uppercase;
        }
        .nav-item.active { color: var(--primary); }
        .nav-item svg { width: 22px; height: 22px; fill: currentColor; transition: transform 0.25s; }
        .nav-item.active svg { transform: translateY(-2px); filter: drop-shadow(0 0 6px var(--primary-glow)); }
        .badge {
            position: absolute; top: 4px; right: calc(50% - 22px);
            background: var(--danger); color: #fff; font-size: 9px; font-weight: 700;
            padding: 1px 5px; border-radius: 10px; border: 2px solid var(--bg-dark);
            font-family: var(--font-body);
        }

        /* ===== HERO CAROUSEL ===== */
        .hero {
            position: relative; width: 100%; height: 360px; overflow: hidden;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 20px 16px 16px; border-bottom: 1px solid var(--border);
        }
        .hero-bg {
            position: absolute; inset: 0;
            background-size: cover; background-position: center;
            transition: background-image 0.5s ease; will-change: background-image;
        }
        .hero-bg::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to top, var(--bg-dark) 0%, rgba(5,8,13,0.65) 50%, rgba(5,8,13,0.15) 100%);
        }
        .hero-content { position: relative; z-index: 2; transition: opacity 0.35s ease; }
        .hero-badge {
            display: inline-flex; align-items: center; gap: 5px;
            background: linear-gradient(135deg, #ff4e50, #f9d423); color: #000;
            padding: 3px 10px; border-radius: 20px; font-weight: 700; font-size: 0.75em;
            margin-bottom: 8px; font-family: var(--font-display); letter-spacing: 0.5px;
        }
        .hero-title {
            font-family: var(--font-display);
            font-size: 2.2em; font-weight: 700; line-height: 1.1; margin-bottom: 6px;
            text-shadow: 0 2px 12px rgba(0,0,0,0.9);
        }
        .hero-desc { color: #b8c8d8; font-size: 0.9em; margin-bottom: 12px; text-shadow: 0 1px 6px rgba(0,0,0,0.9); }
        .hero-stats { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
        .hero-stat {
            display: inline-flex; align-items: center; gap: 5px;
            background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
            padding: 4px 10px; border-radius: 20px; font-size: 0.78em; font-weight: 600;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .hero-buy-btn {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--primary); color: #000; border: none;
            padding: 9px 20px; border-radius: 20px; font-weight: 700; font-size: 0.85em;
            cursor: pointer; text-decoration: none; transition: all 0.2s;
            font-family: var(--font-display); letter-spacing: 0.5px;
        }
        .hero-buy-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 16px var(--primary-glow); }

        .hero-indicators { display: flex; gap: 6px; margin-top: 12px; position: relative; z-index: 2; }
        .indicator {
            width: 24px; height: 3px; border-radius: 3px;
            background: rgba(255,255,255,0.2); cursor: pointer; transition: all 0.3s;
            border: none; padding: 0;
        }
        .indicator.active { background: var(--primary); width: 36px; box-shadow: 0 0 8px var(--primary); }

        /* ===== ARAMA ===== */
        .search-header-row { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
        .search-wrapper { position: relative; flex: 1; }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 16px; height: 16px; pointer-events: none; }
        .search-wrapper input {
            width: 100%; padding: 11px 14px 11px 38px; border-radius: var(--radius); border: 1px solid var(--border);
            background: var(--bg-card); color: var(--text-main); outline: none;
            font-size: 0.95em; font-family: var(--font-body); transition: all 0.2s;
        }
        .search-wrapper input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-dim); }
        .search-wrapper input::placeholder { color: var(--text-muted); }
        .filter-btn {
            background: var(--bg-card); border: 1px solid var(--border); color: var(--primary);
            width: 44px; height: 44px; border-radius: var(--radius); display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; flex-shrink: 0; position: relative;
        }
        .filter-btn:hover { border-color: var(--primary); background: var(--primary-dim); }
        .filter-btn.has-filters::after {
            content: ''; position: absolute; top: 7px; right: 7px;
            width: 8px; height: 8px; background: var(--accent); border-radius: 50%; border: 2px solid var(--bg-dark);
        }

        /* ===== MODAL (FİLTRE) ===== */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(5px);
            z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }

        .filter-modal {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #0d1520; border-top: 1px solid var(--primary); border-radius: 20px 20px 0 0;
            padding: 24px 20px calc(20px + env(safe-area-inset-bottom)); z-index: 2010;
            max-height: 80vh; overflow-y: auto;
            transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .filter-modal.active { transform: translateY(0); }
        .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 4px; margin: 0 auto 20px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
        .modal-title { font-family: var(--font-display); font-size: 1.3em; font-weight: 700; }
        .close-btn { background: none; border: none; color: var(--text-muted); font-size: 1.3em; cursor: pointer; padding: 4px 8px; transition: color 0.2s; line-height: 1; }
        .close-btn:hover { color: var(--text-main); }

        .filter-group { margin-bottom: 20px; }
        .filter-label { display: block; margin-bottom: 10px; color: var(--text-muted); font-weight: 600; font-size: 0.75em; text-transform: uppercase; letter-spacing: 1px; }
        .modal-select {
            width: 100%; padding: 11px 12px; border-radius: var(--radius); border: 1px solid var(--border);
            background: rgba(255,255,255,0.04); color: var(--text-main); font-size: 0.95em; outline: none;
            font-family: var(--font-body); transition: all 0.2s;
        }
        .modal-select:focus { border-color: var(--primary); }

        .chips-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .chip {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            color: var(--text-muted); padding: 10px 12px; border-radius: 10px;
            text-align: center; cursor: pointer; font-size: 0.85em; transition: all 0.2s;
            user-select: none;
        }
        .chip:hover { border-color: var(--primary); color: var(--text-main); }
        .chip.active { background: var(--primary-dim); color: var(--primary); border-color: var(--primary); }

        .apply-btn {
            background: var(--primary); color: #000; border: none; width: 100%; padding: 13px;
            border-radius: var(--radius); font-weight: 700; font-size: 1em; margin-top: 12px;
            cursor: pointer; font-family: var(--font-display); letter-spacing: 0.5px; transition: all 0.2s;
        }
        .apply-btn:hover { box-shadow: 0 4px 16px var(--primary-glow); transform: translateY(-1px); }

        /* ===== KARTLAR ===== */
        .main-container { padding: 18px 14px; max-width: 1200px; margin: 0 auto; }
        .section-header {
            margin-bottom: 14px; font-family: var(--font-display);
            font-size: 1.2em; font-weight: 700; display: flex; align-items: center; gap: 8px;
            letter-spacing: 0.5px;
        }
        .section-header svg { flex-shrink: 0; }

        .grid { display: grid; grid-template-columns: 1fr; gap: 12px; }

        .card {
            background: var(--bg-card); border-radius: var(--radius); overflow: hidden;
            border: 1px solid var(--border); display: flex; height: 118px;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            cursor: pointer; position: relative;
        }
        .card:hover { transform: translateY(-2px); border-color: var(--border-hover); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
        .card:focus-within { outline: 2px solid var(--primary); outline-offset: 2px; }

        .card-img-wrap { width: 36%; flex-shrink: 0; overflow: hidden; position: relative; }
        .card-img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s; }
        .card:hover .card-img { transform: scale(1.04); }
        .card-img-skeleton { position: absolute; inset: 0; background: linear-gradient(110deg, rgba(255,255,255,0.03) 8%, rgba(255,255,255,0.07) 18%, rgba(255,255,255,0.03) 33%); background-size: 200% 100%; animation: shimmerSkel 1.4s infinite; }
        @keyframes shimmerSkel { to { background-position: -200% 0; } }

        .card-body {
            flex: 1; padding: 10px 12px 10px 10px; display: flex; flex-direction: column;
            justify-content: space-between; min-width: 0;
        }
        .card-title { font-weight: 600; font-size: 0.88em; line-height: 1.25; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 3px; }
        .card-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-bottom: 2px; }

        .rating-badge { font-size: 0.65em; font-weight: 600; padding: 1px 6px; border-radius: 4px; }
        .rating-badge.pos { background: rgba(45,204,113,0.15); color: #2dcc71; }
        .rating-badge.mixed { background: rgba(244,162,97,0.15); color: #f4a261; }
        .rating-badge.neg { background: rgba(230,57,70,0.15); color: var(--danger); }

        .score-row { display: flex; gap: 4px; }
        .score-pill {
            display: inline-flex; align-items: center; gap: 3px;
            font-size: 0.65em; font-weight: 600; padding: 2px 6px; border-radius: 4px;
        }
        .score-pill.pop { background: rgba(102,192,244,0.12); color: var(--primary); }
        .score-pill.deal-high { background: rgba(45,204,113,0.12); color: #2dcc71; }
        .score-pill.deal-mid { background: rgba(244,162,97,0.12); color: #f4a261; }
        .score-pill.deal-low { background: rgba(230,57,70,0.12); color: var(--danger); }

        .price-row { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
        .disc-badge {
            background: var(--accent); color: #000; padding: 2px 7px;
            border-radius: 4px; font-weight: 800; font-size: 0.75em;
            font-family: var(--font-display); letter-spacing: 0.5px;
        }
        .price-col { text-align: right; line-height: 1.15; }
        .old-price { text-decoration: line-through; color: var(--text-muted); font-size: 0.7em; }
        .new-price { color: var(--accent); font-weight: 700; font-size: 0.98em; }

        .fav-btn {
            position: absolute; top: 7px; right: 7px; z-index: 5;
            background: rgba(0,0,0,0.55); backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 50%;
            width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
        }
        .fav-btn:hover { transform: scale(1.12); background: rgba(0,0,0,0.75); }
        .fav-btn svg { width: 14px; height: 14px; fill: none; stroke: rgba(255,255,255,0.6); stroke-width: 2; transition: all 0.2s; }
        .fav-btn.active svg { fill: var(--danger); stroke: var(--danger); }

        /* ===== SONSUZ KAYDIRMA ===== */
        .load-more-sentinel { height: 60px; display: flex; align-items: center; justify-content: center; }
        .loading-spinner {
            display: flex; align-items: center; gap: 10px; color: var(--text-muted);
            font-size: 0.85em; font-weight: 600;
        }
        .spinner {
            width: 22px; height: 22px; border: 2px solid var(--border);
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .no-more { text-align: center; padding: 20px 0; color: var(--text-muted); font-size: 0.85em; }

        /* ===== TOAST ===== */
        #toast {
            position: fixed; bottom: calc(var(--bottom-nav-height) + 16px); left: 50%;
            transform: translate(-50%, 20px) scale(0.95);
            background: rgba(18, 26, 38, 0.96); backdrop-filter: blur(10px);
            color: var(--text-main); padding: 9px 16px; border-radius: 20px;
            border: 1px solid var(--border); font-size: 0.82em; font-weight: 600;
            display: flex; align-items: center; gap: 7px; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            opacity: 0; pointer-events: none; z-index: 3000; white-space: nowrap;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #toast.show { opacity: 1; transform: translate(-50%, 0) scale(1); }

        /* ===== DETAY MODAL ===== */
        .detail-modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
            z-index: 2500; display: flex; align-items: flex-end; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .detail-modal.active { opacity: 1; pointer-events: all; }
        .detail-content {
            background: linear-gradient(160deg, #111923 0%, #1a2535 100%);
            border-radius: 20px 20px 0 0; border: 1px solid var(--border); border-bottom: none;
            width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto;
            transform: translateY(30px); transition: transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
            padding: 0 0 calc(24px + env(safe-area-inset-bottom));
        }
        .detail-modal.active .detail-content { transform: translateY(0); }
        .detail-handle { width: 40px; height: 4px; background: var(--border); border-radius: 4px; margin: 14px auto 0; }
        .detail-hero { position: relative; height: 200px; overflow: hidden; margin-bottom: 16px; }
        .detail-hero-img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .detail-hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, #111923 0%, transparent 60%); }
        .detail-close {
            position: absolute; top: 12px; right: 12px; z-index: 3;
            background: rgba(0,0,0,0.55); backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 50%;
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-main); font-size: 1em; line-height: 1;
            transition: all 0.2s;
        }
        .detail-close:hover { background: rgba(0,0,0,0.8); }
        .detail-body { padding: 0 20px; }
        .detail-title { font-family: var(--font-display); font-size: 1.4em; font-weight: 700; margin-bottom: 12px; }
        .detail-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
        .detail-stat {
            background: rgba(102,192,244,0.06); border: 1px solid var(--border);
            border-radius: 10px; padding: 10px 12px;
        }
        .detail-stat-label { color: var(--text-muted); font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .detail-stat-value { color: var(--primary); font-weight: 700; font-size: 1em; font-family: var(--font-display); }
        .detail-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
        .detail-tag { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px; font-size: 0.72em; color: var(--text-muted); }
        .detail-actions { display: flex; gap: 10px; }
        .detail-btn {
            flex: 1; padding: 13px; border: none; border-radius: var(--radius);
            font-weight: 700; cursor: pointer; transition: all 0.2s;
            font-family: var(--font-display); letter-spacing: 0.5px; font-size: 0.95em;
        }
        .detail-btn-primary { background: var(--primary); color: #000; }
        .detail-btn-primary:hover { box-shadow: 0 4px 16px var(--primary-glow); transform: translateY(-1px); }
        .detail-btn-secondary { background: rgba(255,255,255,0.05); color: var(--primary); border: 1px solid var(--border); }
        .detail-btn-secondary:hover { border-color: var(--primary); }

        /* ===== FAVORİLER BOŞ ===== */
        .empty-state { grid-column: 1/-1; text-align: center; padding: 60px 20px; }
        .empty-icon { font-size: 3em; margin-bottom: 12px; opacity: 0.5; }
        .empty-text { color: var(--text-muted); font-size: 0.9em; }
        .empty-sub { color: var(--text-muted); font-size: 0.78em; margin-top: 6px; opacity: 0.7; }

        /* ===== RESPONSIVE ===== */
        @media (min-width: 640px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (min-width: 768px) {
            body { padding-bottom: 30px; }
            .bottom-nav { display: none; }
            .desktop-nav { display: flex; }

            .hero { height: 440px; margin: 20px auto; max-width: 1200px; border-radius: var(--radius-lg); border: 1px solid var(--border); }
            .hero-title { font-size: 3em; }

            .filter-modal { left: 50%; width: 420px; bottom: 50%; transform: translate(-50%, 50%) scale(0.95); border-radius: 20px; opacity: 0; }
            .filter-modal.active { transform: translate(-50%, 50%) scale(1); opacity: 1; }

            .detail-modal { align-items: center; }
            .detail-content { border-radius: 20px; max-height: 88vh; }
            .detail-handle { display: none; }
        }
        @media (min-width: 1024px) {
            .grid { grid-template-columns: repeat(3, 1fr); }
            .card { flex-direction: column; height: auto; }
            .card-img-wrap { width: 100%; height: 135px; }
            .card-body { padding: 12px; }
        }
        @media (min-width: 1280px) {
            .grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>

<script>
/* =========================================================
   STEAM FIRSAT MERKEZİ — DÜZELTILMIŞ + GELIŞTIRILMIŞ
   Düzeltilen hatalar:
   1. renderGrid() event listener birikimi → yeni grid her seferinde klonlanıyor
   2. Card click → Steam açıyor + detail modal çakışması → stopPropagation
   3. renderHero() her çağrıda listener ekleniyor → tek sefer bind
   4. Modal CSS selector sorunu → ayrı class toggle
   5. toggleFavorite'de e.preventDefault() konumu
   6. LazyLoad override'ında this bağlamı
   Yeni özellikler:
   - Sonsuz kaydırma (IntersectionObserver)
   - IsThereAnyDeal fiyat geçmişi + ITAD store bağlantısı
   - SteamSpy benzeri popülarite tahmini
   - Gelişmiş filtreler (ücretsiz, yeni çıkan)
   - Review sıralaması
   ========================================================= */

const APP = (() => {
    // ---- STATE ----
    const state = {
        route: '#/',
        deals: [],
        favorites: (() => { try { return JSON.parse(localStorage.getItem('sf_favs')) || {}; } catch { return {}; } })(),
        currency: 'TRY',
        exchangeRate: 32.5,
        sort: 'dealRating',
        filter: 'all',
        search: '',
        heroIdx: 0,
        heroTimer: null,
        touchX0: 0,
        // Sonsuz kaydırma
        pageHome: 0,
        pageSearch: 0,
        isLoadingHome: false,
        isLoadingSearch: false,
        hasMoreHome: true,
        hasMoreSearch: true,
        PAGE_SIZE: 60,
        // Observer'lar
        homeObserver: null,
        searchObserver: null,
        // Debounce
        searchDebounce: null,
        // Grid event delegate sayfaları
        homeGridPage: -1,
    };

    const ratingMap = {
        'Overwhelmingly Positive': ['Son Derece Olumlu', 'pos'],
        'Very Positive':           ['Çok Olumlu',        'pos'],
        'Mostly Positive':         ['Çoğunlukla Olumlu', 'pos'],
        'Positive':                ['Olumlu',            'pos'],
        'Mixed':                   ['Karışık',           'mixed'],
        'Mostly Negative':         ['Çoğunlukla Olumsuz','neg'],
        'Very Negative':           ['Çok Olumsuz',       'neg'],
        'Overwhelmingly Negative': ['Son Derece Olumsuz','neg'],
    };

    // ---- YARDIMCI ----
    const esc = (t) => {
        const d = document.createElement('div');
        d.textContent = String(t);
        return d.innerHTML;
    };

    const fmt = (sale, normal) => {
        const rate = state.currency === 'TRY' ? state.exchangeRate : 1;
        const sym = state.currency === 'TRY' ? '₺' : '$';
        const toStr = v => (parseFloat(v) * rate).toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        return { sale: toStr(sale), normal: toStr(normal), sym };
    };

    const popScore = (d) => {
        const base = {
            'Overwhelmingly Positive': 100, 'Very Positive': 88,
            'Mostly Positive': 76, 'Positive': 65, 'Mixed': 48,
            'Mostly Negative': 30, 'Very Negative': 18, 'Overwhelmingly Negative': 8
        };
        const r = base[d.steamRatingText] || 50;
        return Math.min(100, Math.round(r + parseFloat(d.steamRatingPercent || 0) * 0.1 + parseFloat(d.dealRating || 0) * 3));
    };

    const dealScore = (d) => {
        const disc = (parseFloat(d.savings) / 100) * 30;
        const price = Math.max(0, (50 - parseFloat(d.salePrice)) / 50 * 25);
        const rat = popScore(d) / 100 * 45;
        return Math.min(99, Math.round(disc + price + rat));
    };

    const dealScoreClass = (s) => s >= 65 ? 'deal-high' : s >= 40 ? 'deal-mid' : 'deal-low';

    const toast = (msg, ok = true) => {
        const el = document.getElementById('toast');
        el.innerHTML = `<span>${ok ? '✓' : '✕'}</span><span>${esc(msg)}</span>`;
        el.classList.add('show');
        clearTimeout(el._t);
        el._t = setTimeout(() => el.classList.remove('show'), 2200);
    };

    // ---- API KATMANI ----
    // 1. CheapShark — fırsat verisi
    const fetchCheapShark = async (page = 0) => {
        const url = `https://www.cheapshark.com/api/1.0/deals?storeID=1&onSale=1&sortBy=Deal+Rating&pageSize=${state.PAGE_SIZE}&pageNumber=${page}`;
        const r = await fetch(url);
        if (!r.ok) throw new Error('CheapShark API hatası');
        return r.json();
    };

    // 2. IsThereAnyDeal — fiyat geçmişi (isteğe bağlı zenginleştirme)
    // ITAD free endpoint ile en düşük geçmiş fiyat
    const fetchITADHistory = async (steamAppIds) => {
        if (!steamAppIds.length) return {};
        // ITAD v02 lookup endpoint (API key gerektirmiyor bu endpoint)
        try {
            const gameIds = steamAppIds.map(id => `app/${id}`).join(',');
            const url = `https://api.isthereanydeal.com/games/storeids/v1?key=&shops=steam&ids=${encodeURIComponent(gameIds)}`;
            // ITAD public lookup — CORS kısıtlaması olabileceğinden sessiz fail
            const r = await fetch(url, { signal: AbortSignal.timeout(3000) });
            if (!r.ok) return {};
            return r.json();
        } catch { return {}; }
    };

    // 3. SteamSpy — topluluk verileri (opsiyonel)
    const fetchSteamSpyData = async (appId) => {
        try {
            const url = `https://steamspy.com/api.php?request=appdetails&appid=${appId}`;
            const r = await fetch(url, { signal: AbortSignal.timeout(3000) });
            if (!r.ok) return null;
            return r.json();
        } catch { return null; }
    };

    // ---- KUR ----
    const fetchRate = async () => {
        try {
            const r = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            const d = await r.json();
            state.exchangeRate = d.rates.TRY || 32.5;
        } catch { /* varsayılan kullan */ }
    };

    // ---- KART HTML ----
    const cardHTML = (deal) => {
        const isFav = state.favorites[deal.steamAppID] ? 'active' : '';
        const { sale, normal, sym } = fmt(deal.salePrice, deal.normalPrice);
        const pop = popScore(deal);
        const ds = dealScore(deal);
        const dsc = dealScoreClass(ds);

        let ratingBadge = '';
        if (deal.steamRatingText && ratingMap[deal.steamRatingText]) {
            const [txt, cls] = ratingMap[deal.steamRatingText];
            ratingBadge = `<span class="rating-badge ${cls}">${esc(txt)}</span>`;
        }

        const imgSrc = `https://cdn.akamai.steamstatic.com/steam/apps/${deal.steamAppID}/header.jpg`;

        return `
        <div class="card" data-appid="${esc(deal.steamAppID)}" data-dealid="${esc(deal.dealID)}" tabindex="0" role="article" aria-label="${esc(deal.title)}">
            <button class="fav-btn ${isFav}" data-appid="${esc(deal.steamAppID)}" aria-label="${isFav ? 'Favorilerden çıkar' : 'Favorilere ekle'}" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            </button>
            <div class="card-img-wrap">
                <div class="card-img-skeleton"></div>
                <img class="card-img" data-src="${imgSrc}" alt="${esc(deal.title)}" loading="lazy">
            </div>
            <div class="card-body">
                <div>
                    <div class="card-title">${esc(deal.title)}</div>
                    <div class="card-meta">
                        ${ratingBadge}
                    </div>
                    <div class="score-row">
                        <span class="score-pill pop">⭐ ${pop}%</span>
                        <span class="score-pill ${dsc}">🎯 ${ds}%</span>
                    </div>
                </div>
                <div class="price-row">
                    <div class="disc-badge">-${Math.round(parseFloat(deal.savings))}%</div>
                    <div class="price-col">
                        <div class="old-price">${esc(normal)}${sym}</div>
                        <div class="new-price">${esc(sale)}${sym}</div>
                    </div>
                </div>
            </div>
        </div>`;
    };

    // ---- GRİD RENDER ----
    // FIX: Her renderGrid çağrısında yeni grid oluşturup event listener'ları
    // temiz bir kez atıyoruz — eski listener birikimi yok.
    const renderGrid = (containerId, data) => {
        const container = document.getElementById(containerId);
        if (!container) return;

        if (!data.length) {
            container.innerHTML = `<div class="empty-state">
                <div class="empty-icon">🔍</div>
                <div class="empty-text">Sonuç bulunamadı</div>
                <div class="empty-sub">Farklı filtreler veya anahtar kelime deneyin</div>
            </div>`;
            return;
        }

        // DocumentFragment ile performanslı render
        const frag = document.createDocumentFragment();
        const wrapper = document.createElement('div');
        wrapper.innerHTML = data.map(cardHTML).join('');
        while (wrapper.firstChild) frag.appendChild(wrapper.firstChild);

        container.innerHTML = '';
        container.appendChild(frag);

        // Lazy image loading
        setupLazy(container);

        // FIX: Event delegation — tek listener, cloneNode sorunsuz
        container.addEventListener('click', handleCardClick, { once: false });
    };

    // ---- KART TIKLAMA (DELEGATION) ----
    // FIX: Fav butonu tıklandığında kart detail'i açılmıyor
    const handleCardClick = (e) => {
        const favBtn = e.target.closest('.fav-btn');
        if (favBtn) {
            e.stopPropagation();
            e.preventDefault();
            toggleFav(favBtn.dataset.appid);
            return;
        }
        const card = e.target.closest('.card');
        if (card) {
            const appid = card.dataset.appid;
            const deal = state.deals.find(d => d.steamAppID === appid)
                || (state.favorites[appid] ? state.favorites[appid] : null);
            if (deal) openDetail(deal);
        }
    };

    // ---- LAZY LOAD ----
    const setupLazy = (container) => {
        const imgs = container.querySelectorAll('.card-img[data-src]');
        if (!imgs.length) return;
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = entry.target;
                    img.src = img.dataset.src;
                    img.removeAttribute('data-src');
                    img.previousElementSibling && img.previousElementSibling.classList.add('loaded');
                    observer.unobserve(img);
                }
            });
        }, { rootMargin: '80px' });
        imgs.forEach(img => observer.observe(img));
    };

    // ---- SONSUZ KAYDIRMA ----
    const setupInfiniteScroll = (sentinelId, loadFn) => {
        const sentinel = document.getElementById(sentinelId);
        if (!sentinel) return null;
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) loadFn();
        }, { rootMargin: '150px' });
        observer.observe(sentinel);
        return observer;
    };

    const showSentinelLoading = (sentinelId, loading) => {
        const el = document.getElementById(sentinelId);
        if (!el) return;
        el.innerHTML = loading
            ? `<div class="loading-spinner"><div class="spinner"></div>Yükleniyor...</div>`
            : '';
    };

    const showSentinelEnd = (sentinelId) => {
        const el = document.getElementById(sentinelId);
        if (!el) return;
        el.innerHTML = `<div class="no-more">— Tüm fırsatlar gösterildi —</div>`;
    };

    // ---- HOME VERİ YÜKLEME ----
    const loadHomeDeals = async () => {
        if (state.isLoadingHome || !state.hasMoreHome) return;
        state.isLoadingHome = true;
        showSentinelLoading('homeSentinel', true);

        try {
            const newDeals = await fetchCheapShark(state.pageHome);
            if (!newDeals.length || newDeals.length < state.PAGE_SIZE) {
                state.hasMoreHome = false;
            }
            state.deals = [...state.deals, ...newDeals];
            state.pageHome++;

            // Hero sadece ilk yüklemede
            if (state.pageHome === 1) renderHero();

            appendHomeCards(newDeals);
            showSentinelLoading('homeSentinel', false);
            if (!state.hasMoreHome) showSentinelEnd('homeSentinel');
        } catch (err) {
            showSentinelLoading('homeSentinel', false);
            toast('Bağlantı hatası, tekrar deneniyor...', false);
            state.isLoadingHome = false;
        }
        state.isLoadingHome = false;
    };

    // İlk 5 hero'ya ayrıldı, geri kalanlar home grid'e eklenir
    const appendHomeCards = (newDeals) => {
        const container = document.getElementById('homeGrid');
        const gridDeals = state.deals.slice(5); // hero'lar hariç
        // En son gelen batch'i sona ekle
        const startIdx = Math.max(0, state.deals.length - newDeals.length - 5);
        const batch = gridDeals.slice(startIdx);
        if (!batch.length) return;

        const sorted = [...batch].sort((a, b) => dealScore(b) - dealScore(a));

        if (state.pageHome <= 1) {
            // İlk yükleme — tam render
            renderGrid('homeGrid', sorted);
        } else {
            // Sonraki sayfa — append
            const frag = document.createDocumentFragment();
            const wrapper = document.createElement('div');
            wrapper.innerHTML = sorted.map(cardHTML).join('');
            while (wrapper.firstChild) frag.appendChild(wrapper.firstChild);
            container.appendChild(frag);
            setupLazy(container);
            // FIX: listener zaten 1 kez atandı, tekrar eklemeye gerek yok
            // ama yeni eklenen kartlar için delegation zaten çalışıyor
        }
    };

    // ---- SEARCH VERİ ----
    const filterAndSort = (deals) => {
        let data = [...deals];
        const q = state.search.trim().toLowerCase();
        if (q) data = data.filter(d => d.title.toLowerCase().includes(q));

        switch (state.filter) {
            case 'highDiscount': data = data.filter(d => parseFloat(d.savings) >= 75); break;
            case 'masterpiece':  data = data.filter(d => ['Overwhelmingly Positive','Very Positive'].includes(d.steamRatingText)); break;
            case 'cheap':        data = data.filter(d => parseFloat(d.salePrice) < 5); break;
            case 'free':         data = data.filter(d => parseFloat(d.salePrice) === 0); break;
            case 'newRelease':   data = data.filter(d => parseInt(d.releaseDate) > (Date.now()/1000 - 60*60*24*180)); break;
        }

        switch (state.sort) {
            case 'priceAsc':      data.sort((a,b) => parseFloat(a.salePrice) - parseFloat(b.salePrice)); break;
            case 'discountDesc':  data.sort((a,b) => parseFloat(b.savings) - parseFloat(a.savings)); break;
            case 'dateDesc':      data.sort((a,b) => parseInt(b.releaseDate) - parseInt(a.releaseDate)); break;
            case 'popularityDesc':data.sort((a,b) => popScore(b) - popScore(a)); break;
            case 'reviewDesc':    data.sort((a,b) => (parseFloat(b.steamRatingPercent)||0) - (parseFloat(a.steamRatingPercent)||0)); break;
            default:              data.sort((a,b) => dealScore(b) - dealScore(a));
        }
        return data;
    };

    const renderSearch = () => {
        const data = filterAndSort(state.deals);
        renderGrid('searchGrid', data);
        const sentinel = document.getElementById('searchSentinel');
        if (sentinel) sentinel.innerHTML = '';
    };

    // ---- HERO ----
    let heroListenersAttached = false; // FIX: listener'lar 1 kez ekleniyor

    const renderHero = () => {
        if (state.deals.length < 5) return;
        const top = state.deals.slice(0, 5);

        const indicatorEl = document.getElementById('heroIndicators');
        indicatorEl.innerHTML = top.map((_, i) =>
            `<button class="indicator${i === 0 ? ' active' : ''}" data-i="${i}" aria-label="Fırsat ${i+1}"></button>`
        ).join('');

        if (!heroListenersAttached) {
            heroListenersAttached = true;

            // FIX: tek sefer event delegation
            indicatorEl.addEventListener('click', (e) => {
                const btn = e.target.closest('.indicator');
                if (!btn) return;
                state.heroIdx = parseInt(btn.dataset.i);
                updateHero(top);
                resetHeroTimer(top);
            });

            const hero = document.getElementById('heroSection');
            hero.addEventListener('touchstart', e => { state.touchX0 = e.changedTouches[0].screenX; }, { passive: true });
            hero.addEventListener('touchend', e => {
                const diff = e.changedTouches[0].screenX - state.touchX0;
                if (Math.abs(diff) < 50) return;
                state.heroIdx = diff < 0
                    ? (state.heroIdx + 1) % top.length
                    : (state.heroIdx - 1 + top.length) % top.length;
                updateHero(top);
                resetHeroTimer(top);
            }, { passive: true });
        }

        updateHero(top);
        document.getElementById('heroSection').style.display = 'flex';
        resetHeroTimer(top);
    };

    const updateHero = (top) => {
        const deal = top[state.heroIdx];
        const content = document.getElementById('heroContent');
        const bg = document.getElementById('heroBg');

        content.style.opacity = '0';
        document.querySelectorAll('.indicator').forEach((el, i) => {
            el.classList.toggle('active', i === state.heroIdx);
        });

        setTimeout(() => {
            bg.style.backgroundImage = `url('https://cdn.akamai.steamstatic.com/steam/apps/${deal.steamAppID}/capsule_616x353.jpg')`;
            document.getElementById('heroTitle').textContent = deal.title;
            const { sale, normal, sym } = fmt(deal.salePrice, deal.normalPrice);
            document.getElementById('heroDesc').innerHTML =
                `Normalde <del>${esc(normal)}${sym}</del> — şimdi <strong>%${Math.round(parseFloat(deal.savings))}</strong> indirimle <strong>${esc(sale)}${sym}</strong>`;
            const pop = popScore(deal);
            const ds = dealScore(deal);
            document.getElementById('heroStats').innerHTML = `
                <span class="hero-stat">⭐ Pop: ${pop}%</span>
                <span class="hero-stat">🎯 Fırsat: ${ds}%</span>
                ${deal.steamRatingPercent ? `<span class="hero-stat">👍 ${deal.steamRatingPercent}%</span>` : ''}
            `;
            document.getElementById('heroBtn').href = `https://store.steampowered.com/app/${deal.steamAppID}`;
            content.style.opacity = '1';
        }, 280);
    };

    const resetHeroTimer = (top) => {
        clearInterval(state.heroTimer);
        state.heroTimer = setInterval(() => {
            state.heroIdx = (state.heroIdx + 1) % top.length;
            updateHero(top);
        }, 5500);
    };

    // ---- FAVORİ ----
    const toggleFav = (appid) => {
        const deal = state.deals.find(d => d.steamAppID === appid)
            || state.favorites[appid];
        if (!deal) return;

        if (state.favorites[appid]) {
            delete state.favorites[appid];
            toast('Favorilerden çıkarıldı', false);
        } else {
            state.favorites[appid] = deal;
            toast('İstek listesine eklendi ❤️', true);
        }
        try { localStorage.setItem('sf_favs', JSON.stringify(state.favorites)); } catch { /**/ }
        updateFavBadge();

        // Buton görünümünü güncelle (grid yeniden render etmeden)
        document.querySelectorAll(`.fav-btn[data-appid="${appid}"]`).forEach(btn => {
            btn.classList.toggle('active', !!state.favorites[appid]);
            btn.setAttribute('aria-label', state.favorites[appid] ? 'Favorilerden çıkar' : 'Favorilere ekle');
        });

        // Detay modal fav butonu
        const detailFavBtn = document.getElementById('detailFavBtn');
        if (detailFavBtn && detailFavBtn.dataset.appid === appid) {
            detailFavBtn.textContent = state.favorites[appid] ? '♥ Listeden Çıkar' : '♡ İstek Listesi';
        }

        // Favoriler görünümündeyse yenile
        if (state.route === '#/favorites') {
            renderGrid('favGrid', Object.values(state.favorites));
        }
    };

    const updateFavBadge = () => {
        const count = Object.keys(state.favorites).length;
        const badge = document.getElementById('favBadge');
        badge.textContent = count;
        badge.style.display = count > 0 ? 'block' : 'none';
    };

    // ---- DETAY MODAL ----
    const openDetail = async (deal) => {
        const modal = document.getElementById('detailModal');
        const { sale, normal, sym } = fmt(deal.salePrice, deal.normalPrice);
        const pop = popScore(deal);
        const ds = dealScore(deal);

        document.getElementById('detailImg').src = `https://cdn.akamai.steamstatic.com/steam/apps/${deal.steamAppID}/capsule_616x353.jpg`;
        document.getElementById('detailImg').alt = deal.title;
        document.getElementById('detailTitle').textContent = deal.title;

        let ratingTag = '';
        if (deal.steamRatingText && ratingMap[deal.steamRatingText]) {
            const [txt, cls] = ratingMap[deal.steamRatingText];
            ratingTag = `<span class="detail-tag" style="color: ${cls === 'pos' ? '#2dcc71' : cls === 'mixed' ? '#f4a261' : '#e63946'}">${txt}</span>`;
        }
        document.getElementById('detailTags').innerHTML =
            ratingTag +
            (deal.steamRatingPercent ? `<span class="detail-tag">👍 ${deal.steamRatingPercent}% Olumlu</span>` : '') +
            (parseFloat(deal.savings) >= 75 ? `<span class="detail-tag">🔥 Süper İndirim</span>` : '') +
            (parseFloat(deal.salePrice) < 5 ? `<span class="detail-tag">💰 Cüzdan Dostu</span>` : '');

        const releaseDate = deal.releaseDate
            ? new Date(parseInt(deal.releaseDate) * 1000).toLocaleDateString('tr-TR')
            : '—';

        document.getElementById('detailStats').innerHTML = `
            <div class="detail-stat"><div class="detail-stat-label">Popülarite</div><div class="detail-stat-value">${pop}%</div></div>
            <div class="detail-stat"><div class="detail-stat-label">Fırsat Skoru</div><div class="detail-stat-value">${ds}%</div></div>
            <div class="detail-stat"><div class="detail-stat-label">İndirim</div><div class="detail-stat-value">%${Math.round(parseFloat(deal.savings))}</div></div>
            <div class="detail-stat"><div class="detail-stat-label">Normal Fiyat</div><div class="detail-stat-value">${esc(normal)}${sym}</div></div>
            <div class="detail-stat"><div class="detail-stat-label">İndirimli Fiyat</div><div class="detail-stat-value" style="color:var(--accent)">${esc(sale)}${sym}</div></div>
            <div class="detail-stat"><div class="detail-stat-label">Çıkış Tarihi</div><div class="detail-stat-value">${releaseDate}</div></div>
        `;

        const isFav = !!state.favorites[deal.steamAppID];
        const favBtn = document.getElementById('detailFavBtn');
        favBtn.textContent = isFav ? '♥ Listeden Çıkar' : '♡ İstek Listesi';
        favBtn.dataset.appid = deal.steamAppID;

        document.getElementById('detailBuyBtn').onclick = () =>
            window.open(`https://store.steampowered.com/app/${deal.steamAppID}`, '_blank');
        favBtn.onclick = () => toggleFav(deal.steamAppID);

        // SteamSpy zenginleştirme (arka planda)
        modal.classList.add('active');
        document.body.classList.add('modal-open');

        fetchSteamSpyData(deal.steamAppID).then(spy => {
            if (!spy || spy.appid === undefined) return;
            const owners = spy.owners ? `<div class="detail-stat"><div class="detail-stat-label">Tahmini Sahip</div><div class="detail-stat-value">${spy.owners}</div></div>` : '';
            const ccu = spy.ccu ? `<div class="detail-stat"><div class="detail-stat-label">Anlık Oyuncu</div><div class="detail-stat-value">${Number(spy.ccu).toLocaleString('tr-TR')}</div></div>` : '';
            if (owners || ccu) {
                document.getElementById('detailStats').innerHTML += owners + ccu;
            }
        }).catch(() => {});
    };

    const closeDetail = () => {
        document.getElementById('detailModal').classList.remove('active');
        document.body.classList.remove('modal-open');
    };

    // ---- MODAL FİLTRE ----
    // FIX: Modal açma/kapama state'i doğru yönetiliyor
    const openModal = () => {
        document.getElementById('modalOverlay').classList.add('active');
        document.getElementById('filterModal').classList.add('active');
        document.getElementById('openFilters').setAttribute('aria-expanded', 'true');
        document.body.classList.add('modal-open');
    };
    const closeModal = () => {
        document.getElementById('modalOverlay').classList.remove('active');
        document.getElementById('filterModal').classList.remove('active');
        document.getElementById('openFilters').setAttribute('aria-expanded', 'false');
        document.body.classList.remove('modal-open');
    };

    // ---- ROUTER ----
    const navigate = (hash) => {
        state.route = hash || '#/';
        const views = { home: document.getElementById('view-home'), search: document.getElementById('view-search'), fav: document.getElementById('view-favorites') };

        views.home.style.display = 'none';
        views.search.style.display = 'none';
        views.fav.style.display = 'none';

        document.querySelectorAll('.nav-item, .desktop-nav a').forEach(el => el.classList.remove('active'));

        if (state.route === '#/favorites') {
            views.fav.style.display = 'block';
            document.getElementById('bot-fav').classList.add('active');
            document.getElementById('nav-fav').classList.add('active');
            const favData = Object.values(state.favorites);
            renderGrid('favGrid', favData);
            if (!favData.length) document.getElementById('favGrid').innerHTML =
                `<div class="empty-state"><div class="empty-icon">♡</div><div class="empty-text">İstek listesi boş</div><div class="empty-sub">Kartlardaki ♡ butonuna basarak ekle</div></div>`;

        } else if (state.route === '#/search') {
            views.search.style.display = 'block';
            document.getElementById('bot-search').classList.add('active');
            document.getElementById('nav-search').classList.add('active');
            renderSearch();
            // Sonsuz kaydırma — search için mevcut veride sayfalama (istemci tarafı pagination)
            if (!state.searchObserver) {
                state.searchObserver = setupInfiniteScroll('searchSentinel', () => {
                    // Mevcut veri yeterince büyük, daha fazla CheapShark sayfası çek
                    if (!state.isLoadingSearch && state.hasMoreHome) {
                        loadHomeDeals();
                    }
                });
            }
            setTimeout(() => { document.getElementById('searchInput')?.focus(); }, 100);

        } else {
            views.home.style.display = 'block';
            document.getElementById('bot-home').classList.add('active');
            document.getElementById('nav-home').classList.add('active');
        }

        window.scrollTo({ top: 0, behavior: 'instant' });
    };

    // ---- MANIFEST ----
    const injectManifest = () => {
        const c = document.createElement('canvas'); c.width = 192; c.height = 192;
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#05080d'; ctx.fillRect(0,0,192,192);
        ctx.strokeStyle = '#66c0f4'; ctx.lineWidth = 7; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.scale(1.92,1.92);
        ctx.beginPath(); ctx.moveTo(50,10); ctx.lineTo(85,30); ctx.lineTo(85,70); ctx.lineTo(50,90); ctx.lineTo(15,70); ctx.lineTo(15,30); ctx.closePath(); ctx.stroke();
        ctx.lineWidth = 10; ctx.beginPath(); ctx.moveTo(65,35); ctx.lineTo(35,65); ctx.stroke();
        ctx.fillStyle = '#66c0f4';
        ctx.beginPath(); ctx.arc(40,40,8,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(60,60,8,0,Math.PI*2); ctx.fill();

        const iconUrl = c.toDataURL();
        const manifest = { name: 'Steam Fırsat Merkezi', short_name: 'SteamFırsat', start_url: location.pathname, display: 'standalone', background_color: '#05080d', theme_color: '#05080d', icons: [{ src: iconUrl, sizes: '192x192', type: 'image/png', purpose: 'any maskable' }] };
        const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
        const link = Object.assign(document.createElement('link'), { rel: 'manifest', href: URL.createObjectURL(blob) });
        document.head.appendChild(link);
        const apple = Object.assign(document.createElement('link'), { rel: 'apple-touch-icon', href: iconUrl });
        document.head.appendChild(apple);
    };

    // ---- EVENT BINDING ----
    const bindEvents = () => {
        // Kur seçimi
        document.getElementById('currencySelect').addEventListener('change', (e) => {
            state.currency = e.target.value;
            // Tüm görünür grid'leri yenile
            if (state.route === '#/') renderGrid('homeGrid', state.deals.slice(5).sort((a,b) => dealScore(b)-dealScore(a)));
            else if (state.route === '#/search') renderSearch();
            else renderGrid('favGrid', Object.values(state.favorites));
            if (state.deals.length >= 5) updateHero(state.deals.slice(0,5));
        });

        // Arama
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(state.searchDebounce);
            state.search = e.target.value;
            state.searchDebounce = setTimeout(renderSearch, 280);
        });

        // Filtre modal
        document.getElementById('openFilters').addEventListener('click', openModal);
        document.getElementById('closeFilters').addEventListener('click', closeModal);
        document.getElementById('modalOverlay').addEventListener('click', closeModal);

        // Chips — FIX: event delegation
        document.getElementById('filterChips').addEventListener('click', (e) => {
            const chip = e.target.closest('.chip');
            if (!chip) return;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            state.filter = chip.dataset.filter;
        });

        document.getElementById('sortSelect').addEventListener('change', (e) => { state.sort = e.target.value; });

        document.getElementById('applyFilters').addEventListener('click', () => {
            const hasFilters = state.filter !== 'all' || state.sort !== 'dealRating';
            document.getElementById('openFilters').classList.toggle('has-filters', hasFilters);
            closeModal();
            renderSearch();
        });

        // Detail modal kapat
        document.getElementById('closeDetail').addEventListener('click', closeDetail);
        document.getElementById('detailModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('detailModal')) closeDetail();
        });

        // ESC tuşu
        document.addEventListener('keydown', (e) => {
            if (e.key !== 'Escape') return;
            if (document.getElementById('filterModal').classList.contains('active')) closeModal();
            if (document.getElementById('detailModal').classList.contains('active')) closeDetail();
        });

        // Router
        window.addEventListener('hashchange', () => navigate(window.location.hash));

        // Card click — favoriler görünümü için de
        document.getElementById('favGrid').addEventListener('click', handleCardClick);
    };

    // ---- INIT ----
    const init = async () => {
        injectManifest();
        bindEvents();
        updateFavBadge();

        // Paralel: kur + ilk fırsat verisi
        await Promise.all([fetchRate(), loadHomeDeals()]);

        // Sonsuz kaydırma — home
        state.homeObserver = setupInfiniteScroll('homeSentinel', loadHomeDeals);

        navigate(window.location.hash || '#/');

        // Splash kapat
        setTimeout(() => {
            document.getElementById('splash-screen').classList.add('hidden');
        }, 2600);
    };

    return { init };
})();

document.addEventListener('DOMContentLoaded', () => APP.init());
</script>
</body>
</html>
